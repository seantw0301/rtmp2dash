rtmp:
  listen: "0.0.0.0"
  port: 6136
  app: "live"

dash:
  listen: "0.0.0.0"
  port: 8080

cache:
  dir: "./cache"
  # Target DASH segment length in seconds (default: 2). Cuts on video keyframes
  # once this duration has been buffered.
  segment_duration_secs: 2
  # Keep enough segments for continuous live players (~3 min @ 2s).
  # On-disk prune keeps window_segments + 2 grace files.
  window_segments: 90
  # Delete expired seg_*.m4s by mtime. Orphan index.mpd (no segments left, past TTL)
  # is also removed so HTTP does not keep a ghost timeline after origin restart.
  # init.mp4 alone is not enough to keep a channel "live".
  # Default when omitted: max(30, window_segments * segment_duration_secs * 2)
  # ttl_secs: 60
  cleanup_interval_secs: 180
  # Rotate CMAF generation when |audio_tfdt − video_tfdt| exceeds this (ms).
  av_tfdt_max_skew_ms: 500
  # Publish-session timer re-checks newest on-disk seg for A/V skew (seconds).
  av_tfdt_check_interval_secs: 2

# Pull remote RTMP sources in parallel with local publish ingest.
# Each entry remuxes to http://<dash.host>:<dash.port>/live/<channel>/index.mpd
# Example (replace with your own origin; do not commit real production URLs):
# pull:
#   - url: "rtmp://origin.example.com:1935/live/stream1"
#     channel: "demo"
#     reconnect_secs: 3
pull: []
